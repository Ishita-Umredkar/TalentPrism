ai_usage_summary: |
  Used Gemini for extraction of constraints from the job description.
  Used Antigravity for script writing assistance, pipeline refactoring, and directory layout cleanup.
  Used ChatGPT for architectural design assistance.
  No candidate profile data was shared with external LLMs.

# ============================================================================
# Approach summary
# ============================================================================
methodology_summary: |
  Three-stage candidate ranking engine:
  - Stage 1 (Credibility Check): Evaluates candidate profiles using 10 honeypot detectors (flagging future-dated starts, faked timelines, company age inconsistencies, and profile inflation) to compute credibility multipliers.
  - Stage 2 (Constraint & Semantic Fit Scoring): Scores candidate profiles against 17 Must-Have, Preferred, Negative, and Rejection requirements grouped into 8 high-level categories (Retrieval, LLMs, Production ML, Stability, etc.) using normalized cosine similarities of BGE-embedded texts.
  - Stage 3 (Joint Scoring, Tie-Breaking, & Explainability): Combines Stage 1 and Stage 2 scores, breaks ties deterministically (using Logistics score then alphabetical ID), generates natural language justifications by mapping top-4 category extremeness to templates, and exports the final CSV and report.
  The complete pipeline scores and justifies 100k candidates under 90 seconds on CPU.

